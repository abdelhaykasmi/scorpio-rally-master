name: rally_master
description: Off-Road Experience RAID - Adventure Motorcycle Rally Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: 3.6.0
  cloud_firestore: 5.4.3
  firebase_storage: 12.3.2

  # State Management
  provider: 6.1.5+1

  # Local Storage (Offline Mode)
  hive: 2.2.3
  hive_flutter: 1.1.0
  shared_preferences: 2.5.3

  # QR Code
  qr_flutter: 4.1.0
  mobile_scanner: 5.2.3

  # Networking
  http: 1.5.0

  # UI Utilities
  intl: 0.19.0
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  url_launcher: ^6.3.0
  path_provider: ^2.1.4
  file_picker: ^8.1.2
  permission_handler: ^11.3.1

  # CSV Export
  csv: ^6.0.0

  # Crypto for QR
  crypto: ^3.0.3

  # UUID
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
